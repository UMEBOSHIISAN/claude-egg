; Claude-EGG — firmware skeleton for M5Stack Cardputer
; ESP32-S3 + 240x135 TFT + QWERTY. Asset packs live in data/chars/ and are
; flashed to LittleFS separately with `pio run -t uploadfs`.

[env:m5cardputer]
platform          = espressif32
board             = m5stack-stamps3
framework         = arduino
monitor_speed     = 115200
monitor_filters   = esp32_exception_decoder

board_build.filesystem  = littlefs
board_build.partitions  = default_8MB.csv

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=0
    ; Override at fork time to ship your own pack as default:
    -DDEFAULT_BUDDY=\"default\"

lib_deps =
    m5stack/M5Cardputer     @ ^1.0.0
    h2zero/NimBLE-Arduino   @ ^1.4.2
    bblanchon/ArduinoJson   @ ^7.0.0
    bitbank2/AnimatedGIF    @ ^2.1.1
